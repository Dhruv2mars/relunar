name: release

on:
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_name }}

concurrency: ${{ github.workflow }}-${{ github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag and package
        id: meta
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="$(node -p "require('./packages/cli/package.json').version")"
          expected="v${version}"
          if [ "${RELEASE_TAG}" != "${expected}" ]; then
            echo "tag/version mismatch: tag=${RELEASE_TAG} package=${expected}"
            exit 1
          fi
          if node -p "require('./packages/cli/package.json').private === true" | grep -q true; then
            echo "package must be publishable"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: bun run verify

      - name: Pack dry run
        run: npm pack --dry-run
        working-directory: packages/cli

  create_release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: Dhruv2mars/relunar
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes

  publish_npm:
    needs:
      - validate
      - create_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish npm
        run: |
          set -euo pipefail
          local_v="$(node -p "require('./packages/cli/package.json').version")"
          remote_v="$(npm view @dhruv2mars/relunar version 2>/dev/null || true)"
          if [ -n "${remote_v:-}" ] && [ "${remote_v}" = "${local_v}" ]; then
            echo "skip: already on npm (${remote_v})"
            exit 0
          fi
          rc="${RUNNER_TEMP:-/tmp}/npmrc"
          echo "registry=https://registry.npmjs.org/" > "$rc"
          export NPM_CONFIG_USERCONFIG="$rc"
          cd packages/cli
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$rc"
            export NODE_AUTH_TOKEN="${NPM_TOKEN}"
            npm publish --access public
          else
            unset NODE_AUTH_TOKEN || true
            npm publish --provenance --access public
          fi
