name: release

on:
  push:
    tags:
      - "v*"
  repository_dispatch:
    types:
      - release-rerun
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish, ex: v0.1.1"
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve_tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_EVENT_NAME}" in
            repository_dispatch)
              release_tag="$(jq -r '.client_payload.release_tag // empty' "$GITHUB_EVENT_PATH")"
              ;;
            workflow_dispatch)
              release_tag="$(jq -r '.inputs.release_tag // empty' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              release_tag="${GITHUB_REF_NAME}"
              ;;
          esac
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  validate:
    needs: resolve_tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Validate tag and package
        id: meta
        env:
          RELEASE_TAG: ${{ needs.resolve_tag.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="$(node -p "require('./packages/cli/package.json').version")"
          root_version="$(node -p "require('./package.json').version")"
          expected="v${version}"
          if [ "${RELEASE_TAG}" != "${expected}" ]; then
            echo "tag/version mismatch: tag=${RELEASE_TAG} package=${expected}"
            exit 1
          fi
          if [ "${root_version}" != "${version}" ]; then
            echo "root/package version mismatch: root=${root_version} package=${version}"
            exit 1
          fi
          if node -p "require('./packages/cli/package.json').private === true" | grep -q true; then
            echo "package must be publishable"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        shell: bash
        run: bun run verify

      - name: Pack dry run
        shell: bash
        working-directory: packages/cli
        run: npm pack --dry-run

  create_release:
    needs: [resolve_tag, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}

      - name: Create release
        env:
          RELEASE_TAG: ${{ needs.resolve_tag.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes

  publish_npm:
    needs: [resolve_tag, validate, create_release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_tag.outputs.release_tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Publish npm
        shell: bash
        run: |
          set -euo pipefail
          local_v="$(node -p "require('./packages/cli/package.json').version")"
          remote_v="$(npm view @dhruv2mars/relunar version 2>/dev/null || true)"
          if [ -n "${remote_v:-}" ] && [ "${remote_v}" = "${local_v}" ]; then
            echo "skip: already on npm (${remote_v})"
            exit 0
          fi
          rc="${RUNNER_TEMP:-/tmp}/npmrc"
          echo "registry=https://registry.npmjs.org/" > "$rc"
          export NPM_CONFIG_USERCONFIG="$rc"
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$rc"
            export NODE_AUTH_TOKEN="${NPM_TOKEN}"
            cd packages/cli && npm publish --access public
          else
            echo "publish via npm trusted publisher"
            unset NODE_AUTH_TOKEN || true
            if cd packages/cli && npm publish --provenance --access public; then
              exit 0
            fi
            echo "trusted publisher not configured and NPM_TOKEN missing"
            exit 1
          fi
